<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Quest — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <!-- Particle Stars -->
    <canvas id="star-canvas"></canvas>

    <main class="login-wrapper">
        <!-- Branding / Left Side -->
        <div class="brand-panel">
            <div class="brand-logo">
                <i class="fa-brands fa-python icon-spin"></i>
            </div>
            <h1 class="brand-title">Python Quest</h1>
            <p class="brand-tagline">Level up your Python skills,<br>one challenge at a time.</p>
            <div class="brand-features">
                <div class="feature-item">
                    <i class="fa-solid fa-map"></i>
                    <span>Interactive Stage Map</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-code"></i>
                    <span>Live Python Console</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-trophy"></i>
                    <span>Track Your Progress</span>
                </div>
            </div>
        </div>

        <!-- Auth Card / Right Side -->
        <div class="auth-card glass-card">
            <h2>Begin Your Quest</h2>
            <p class="auth-subtitle">Choose how you want to play</p>

            <!-- Google Sign In -->
            <button id="btn-google" class="btn-google">
                <svg class="google-icon" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <!-- Guest Login -->
            <button id="btn-guest" class="btn-guest">
                <i class="fa-solid fa-user-secret"></i>
                <span>Play as Guest</span>
            </button>

            <p class="guest-note">
                <i class="fa-solid fa-circle-info"></i>
                Guest progress is not saved between sessions.
            </p>

            <!-- Status Message -->
            <div id="auth-status" class="auth-status"></div>
        </div>
    </main>

    <script type="module" src="auth.js"></script>
</body>
</html>
